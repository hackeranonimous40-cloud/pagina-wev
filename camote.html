<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMOTE CR - Sistema Inteligente de Siembra | Orinoco Farm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0 20px;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-top: 8px;
        }
        .subtitle a {
            color: #94a3b8;
            text-decoration: none;
        }
        .subtitle a:hover { color: #22c55e; }
        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: #1e293b;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .card-icon {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .icon-green { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .icon-blue { background: rgba(14, 165, 233, 0.2); color: #0ea5e9; }
        .icon-orange { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .icon-purple { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .icon-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .full-width { grid-column: 1 / -1; }
        .planting-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        .planting-table th {
            background: #0f172a;
            padding: 12px 8px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
        }
        .planting-table td {
            padding: 14px 8px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }
        .planting-table tr:hover { background: rgba(34, 197, 94, 0.1); }
        .planting-table tr.optimo { background: rgba(34, 197, 94, 0.15); font-weight: 600; }
        .planting-table tr.bueno { background: rgba(245, 158, 11, 0.1); }
        .planting-table .precio { font-weight: 700; color: #22c55e; font-size: 1.1rem; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; }
        .badge-optimo { background: #22c55e; color: white; }
        .badge-bueno { background: #f59e0b; color: white; }
        .badge-normal { background: #334155; color: #94a3b8; }
        .chart-container { height: 220px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-item { text-align: center; padding: 12px; background: #0f172a; border-radius: 12px; }
        .stat-value { font-size: 1.3rem; font-weight: 700; color: #22c55e; }
        .stat-label { font-size: 0.7rem; color: #94a3b8; margin-top: 4px; }
        .info-box {
            background: rgba(14, 165, 233, 0.1);
            border: 1px solid #0ea5e9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            text-align: center;
        }
        .info-box p { color: #94a3b8; font-size: 0.9rem; }
        .info-box strong { color: #22c55e; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #94a3b8; padding: 30px; }
        .spinner { width: 25px; height: 25px; border: 3px solid #334155; border-top-color: #22c55e; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .today-badge { background: #22c55e; color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; }
        .command-section { grid-column: 1 / -1; }
        .command-interface { display: flex; gap: 12px; margin-top: 12px; }
        .command-input { flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #f8fafc; font-size: 0.95rem; outline: none; }
        .command-input:focus { border-color: #22c55e; }
        .command-btn { padding: 12px 24px; border-radius: 12px; border: none; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; font-weight: 600; cursor: pointer; }
        .command-btn:hover { transform: scale(1.05); }
        .command-response { margin-top: 15px; padding: 15px; background: #0f172a; border-radius: 12px; font-family: monospace; font-size: 0.85rem; max-height: 250px; overflow-y: auto; display: none; }
        .command-response.show { display: block; }
        footer { text-align: center; padding: 30px 0; color: #94a3b8; font-size: 0.8rem; }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
</footer>
</div>
<script src="static/camote.js"></script>
</body>
</html>
